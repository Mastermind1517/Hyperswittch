<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Toggle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#0f1115,#06070a 70%);
    font-family:Segoe UI, sans-serif;
    transition:background .4s ease;
}

body.light-mode{
    background:#ffffff;
}

/* ===== WRAPPER ===== */
.switch-wrapper{
    position:relative;
    width:160px;
    height:80px;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
}

/* Hidden checkbox */
.switch-input{
    display:none;
}

/* ===== TRACK ===== */
.switch-track{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:80px;

    background:linear-gradient(145deg,#1e2128,#0f1115);
    border:1px solid rgba(255,255,255,0.06);

    box-shadow:
        inset 0 3px 8px rgba(0,0,0,.8),
        inset 0 -2px 4px rgba(255,255,255,.04),
        0 15px 40px rgba(0,0,0,.6);

    transition:all .4s ease;
}

/* ===== KNOB ===== */
.switch-knob{
    position:absolute;
    top:8px;
    left:8px;
    width:64px;
    height:64px;
    border-radius:50%;

    /* OFF = BLACK */
    background:linear-gradient(145deg,#2a2f36,#0d0f13);

    box-shadow:
        0 12px 25px rgba(0,0,0,.6),
        inset 0 3px 6px rgba(255,255,255,.08),
        inset 0 -3px 6px rgba(0,0,0,.9);

    transition:all .45s cubic-bezier(.25,1.4,.3,1);
    will-change:transform, background;
}

.switch-wrapper:focus {
    outline: none;
}

/* Subtle hover lift */
.switch-wrapper:hover .switch-knob{
    transform:scale(1.04);
}

/* ===== ON STATE ===== */
.switch-input:checked + .switch-track{
    background:linear-gradient(145deg,#252a33,#14161c);
}

/* Move + turn white */
.switch-input:checked + .switch-track .switch-knob{
    transform:translateX(80px);

    /* ON = WHITE */
    background:linear-gradient(145deg,#ffffff,#dcdcdc);

    box-shadow:
        0 12px 25px rgba(0,0,0,.5),
        inset 0 3px 8px rgba(255,255,255,.9),
        inset 0 -3px 6px rgba(0,0,0,.15);
}

/* Press depth */
.switch-wrapper:active .switch-knob{
    transform:scale(.94);
}
</style>
</head>

<body>

<label class="switch-wrapper">
    <input type="checkbox" class="switch-input" id="toggle">
    <div class="switch-track">
        <div class="switch-knob"></div>
    </div>
</label>

<audio id="toggleSound" src="click.wav" preload="auto"></audio>

<script>
    const input = document.getElementById('toggle');
    const wrapper = document.querySelector('.switch-wrapper');
    const sound = document.getElementById('toggleSound');

    /* 🔓 Unlock audio on first real click */
    document.addEventListener("click", () => {
        sound.play().then(() => {
            sound.pause();
            sound.currentTime = 0;
        }).catch(()=>{});
    }, { once: true });

    /* 🎵 Play sound when toggle is clicked */
    wrapper.addEventListener("click", () => {
        sound.currentTime = 0;
        sound.play().catch(()=>{});
    });

    /* 🌗 Toggle background */
    input.addEventListener("change", () => {
        document.body.classList.toggle("light-mode", input.checked);
    });
</script>
</body>

</html>
